version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: uztransformator
      POSTGRES_USER: uztrans_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgre}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://uztrans_user:${POSTGRES_PASSWORD:-postgre}@db:5432/uztransformator
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://uztransformator.vercel.app}
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
